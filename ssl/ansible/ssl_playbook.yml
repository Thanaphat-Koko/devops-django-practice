---
# =============================================================================
# SSL Certificate Replacement Automation Playbook
# Task 2.2: Use automation tools to replace SSL certificates on a web server
#
# Usage:
#   ansible-playbook -i inventory.ini ssl_playbook.yml
#
# Tags:
#   install   - Only install certbot
#   obtain    - Obtain a new certificate
#   replace   - Replace (revoke + re-obtain) certificate
#   renew     - Renew existing certificate
#   configure - Only update nginx config
#   cron      - Only set up auto-renewal
# =============================================================================

- name: SSL Certificate Replacement Automation
  hosts: webservers
  become: true

  vars:
    domain: "thanappe.infinix-lab.com"
    email: "admin@infinix-lab.com"
    project_dir: "/home/thanaphat_peth/Desktops/devops-django-practice"
    ssl_dir: "{{ project_dir }}/ssl"
    webroot_path: "/var/www/certbot"
    cert_path: "/etc/letsencrypt/live/{{ domain }}"
    backup_dir: "{{ ssl_dir }}/ssl_backups"
    nginx_container: "nginx-webserver"

  roles:
    - ssl
